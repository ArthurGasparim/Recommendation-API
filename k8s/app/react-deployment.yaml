apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: dev
  labels:
    app: react-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react-frontend
  template:
    metadata:
      labels:
        app: react-frontend
    spec:
      containers:
      - name: frontend
        image: 043309322198.dkr.ecr.us-east-1.amazonaws.com/react-frontend:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Always