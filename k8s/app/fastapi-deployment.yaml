apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-recommender
  namespace: dev
  labels:
    app: fastapi-recommender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-recommender
  template:
    metadata:
      labels:
        app: fastapi-recommender
    # ... resto do seu arquivo fastapi-deployment.yaml ...
    spec:
      containers:
      - name: fastapi
        image: 043309322198.dkr.ecr.us-east-1.amazonaws.com/fastapi-recommender:latest
        ports:
        - containerPort: 5000
        imagePullPolicy: Always
        # --- ADICIONE ESTA PARTE ---
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres123@postgres-svc:5432/bookstore_db"